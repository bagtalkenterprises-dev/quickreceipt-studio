<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickReceipt</title>
<style>
body{font-family:Arial;background:#f3f3f3;padding:20px}
.app{max-width:400px;margin:auto;background:#fff;padding:20px;border-radius:20px}
input,textarea{width:100%;margin:10px 0;padding:10px;border-radius:10px;border:1px solid #ccc}
button{padding:12px;border:none;border-radius:10px;background:#000;color:#fff;width:100%}
.preview{
  background:#fff;
  color:#000;
  font-family:"Courier New",monospace;
  padding:15px;
  margin-top:20px;
  white-space:pre-wrap;
  border:1px solid #ddd;
}
</style>
</head>

<body>
<div class="app">
<h2>Receipt Generator</h2>

<input id="name" value="ASHLEY CUSTOM DESIGNS">
<input id="date" value="03/15/2026">
<input id="time" value="03:45 PM">
<input id="order" value="1001">

<textarea id="items">CUSTOM SHIRT|20
LOGO PRINT|15
STICKER PACK|5</textarea>

<input id="tax" value="8.25">
<input id="footer" value="THANK YOU FOR YOUR BUSINESS">

<button onclick="gen()">Generate</button>

<div class="preview" id="out">Press Generate</div>
</div>

<script>
function line(a,b){
a=a.toUpperCase()
b=parseFloat(b).toFixed(2)
let s=32-a.length-b.length
if(s<1)s=1
return a+" ".repeat(s)+b
}

function gen(){
let n=name.value.toUpperCase()
let d=date.value
let t=time.value
let o=order.value
let tax=parseFloat(document.getElementById("tax").value||0)
let f=footer.value.toUpperCase()

let rows=items.value.split("\n")
let sub=0
let txt=n+"\n\nDATE: "+d+"\nTIME: "+t+"\nORDER: "+o+"\n\n"

rows.forEach(r=>{
let p=r.split("|")
if(p.length<2)return
let nm=p[0]
let pr=parseFloat(p[1])
if(!nm||isNaN(pr))return
sub+=pr
txt+=line(nm,pr)+"\n"
})

let taxAmt=sub*(tax/100)
let total=sub+taxAmt

txt+="\n"+line("SUBTOTAL",sub)
txt+="\n"+line("TAX",taxAmt)
txt+="\n"+line("TOTAL",total)
txt+="\n\n"+f

document.getElementById("out").textContent=txt
}
</script>
</body>
</html>
