<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Generator</title>
  <style>
    body{
      margin:0;
      padding:20px;
      font-family:Arial, sans-serif;
      background:#f3f3f3;
      color:#111;
    }
    .app{
      max-width:420px;
      margin:0 auto;
      background:#fff;
      padding:20px;
      border-radius:20px;
      box-sizing:border-box;
    }
    h2{
      margin:0 0 16px 0;
      font-size:24px;
    }
    input, textarea, button{
      width:100%;
      box-sizing:border-box;
      margin:10px 0;
      padding:12px;
      border-radius:10px;
      font-size:16px;
    }
    input, textarea{
      border:1px solid #ccc;
      background:#fff;
      color:#000;
    }
    textarea{
      min-height:120px;
      resize:vertical;
    }
    button{
      border:none;
      background:#000;
      color:#fff;
      cursor:pointer;
      font-weight:600;
    }
    .preview{
      margin-top:20px;
      padding:15px;
      border:1px solid #ddd;
      background:#fff;
      color:#000;
      font-family:"Courier New", monospace;
      white-space:pre-wrap;
      border-radius:10px;
      min-height:120px;
    }
    .label{
      font-size:14px;
      font-weight:700;
      margin-top:8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h2>Receipt Generator</h2>

    <div class="label">Business Name</div>
    <input id="name" value="ASHLEY CUSTOM DESIGNS">

    <div class="label">Date</div>
    <input id="date" value="03/15/2026">

    <div class="label">Time</div>
    <input id="time" value="03:45 PM">

    <div class="label">Order Number</div>
    <input id="order" value="1001">

    <div class="label">Items (one per line: ITEM NAME|PRICE)</div>
    <textarea id="items">CUSTOM SHIRT|20
LOGO PRINT|15
STICKER PACK|5</textarea>

    <div class="label">Tax Rate (%)</div>
    <input id="tax" value="8.25">

    <div class="label">Footer</div>
    <input id="footer" value="THANK YOU FOR YOUR BUSINESS">

    <button id="generateBtn" type="button">Generate</button>

    <div class="preview" id="out">Press Generate</div>
  </div>

  <script>
    function formatLine(left, right) {
      left = String(left).toUpperCase();
      right = Number(right).toFixed(2);
      let spaces = 32 - left.length - right.length;
      if (spaces < 1) spaces = 1;
      return left + " ".repeat(spaces) + right;
    }

    function genReceipt() {
      const nameEl = document.getElementById("name");
      const dateEl = document.getElementById("date");
      const timeEl = document.getElementById("time");
      const orderEl = document.getElementById("order");
      const itemsEl = document.getElementById("items");
      const taxEl = document.getElementById("tax");
      const footerEl = document.getElementById("footer");
      const outEl = document.getElementById("out");

      const name = (nameEl.value || "").toUpperCase();
      const date = dateEl.value || "";
      const time = timeEl.value || "";
      const order = orderEl.value || "";
      const taxRate = parseFloat(taxEl.value || "0");
      const footer = (footerEl.value || "").toUpperCase();

      const rows = (itemsEl.value || "").split("\n");
      let subtotal = 0;

      let txt = "";
      txt += name + "\n\n";
      txt += "DATE: " + date + "\n";
      txt += "TIME: " + time + "\n";
      txt += "ORDER: " + order + "\n\n";

      rows.forEach(function(row) {
        const parts = row.split("|");
        if (parts.length < 2) return;

        const itemName = (parts[0] || "").trim();
        const itemPrice = parseFloat((parts[1] || "").trim());

        if (!itemName || isNaN(itemPrice)) return;

        subtotal += itemPrice;
        txt += formatLine(itemName, itemPrice) + "\n";
      });

      const taxAmount = subtotal * (taxRate / 100);
      const total = subtotal + taxAmount;

      txt += "\n";
      txt += formatLine("SUBTOTAL", subtotal) + "\n";
      txt += formatLine("TAX", taxAmount) + "\n";
      txt += formatLine("TOTAL", total) + "\n\n";
      txt += footer;

      outEl.textContent = txt;
    }

    document.getElementById("generateBtn").addEventListener("click", genReceipt);
  </script>
</body>
</html>
