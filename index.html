<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Generator</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial;
  background:#f3f3f3;
}

.app{
  max-width:440px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:20px;
}

input, textarea{
  width:100%;
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

textarea{
  min-height:110px;
}

button{
  width:100%;
  padding:14px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.preview{
  margin-top:20px;
  padding:15px;
  border:1px solid #ddd;
  background:#fff;
  font-family:"Courier New", monospace;
  font-weight:700;
  letter-spacing:0.5px;
  text-shadow:0.3px 0.3px 0px #000;
  white-space:pre-wrap;
  line-height:1.2;
}
</style>
</head>

<body>

<div class="app">
<h2>Receipt Generator</h2>

<input id="name" value="ASHLEY CUSTOM DESIGNS">
<input id="location" value="ORANGE, TX">
<input id="store" value="001">
<input id="operator" value="1001">
<input id="terminal" value="1">
<input id="transaction" value="1001">

<textarea id="items">CUSTOM SHIRT|20
LOGO PRINT|15
STICKER PACK|5</textarea>

<input id="tax" value="8.25">
<input id="tender" value="CARD TEND">

<textarea id="footer">THANK YOU FOR SUPPORTING
A SMALL BUSINESS
RETURNS WITH RECEIPT
WITHIN 30 DAYS</textarea>

<input id="date" value="03/15/26">
<input id="time" value="03:45:00">

<button onclick="gen()">Generate</button>

<div class="preview" id="out">Press Generate</div>

</div>

<script>
function line(l,r){
  l=l.toUpperCase()
  r=Number(r).toFixed(2)
  let s=32-l.length-r.length
  if(s<1)s=1
  return l+" ".repeat(s)+r
}

function gen(){

let name=document.getElementById("name").value
let loc=document.getElementById("location").value
let st=document.getElementById("store").value
let op=document.getElementById("operator").value
let te=document.getElementById("terminal").value
let tr=document.getElementById("transaction").value
let items=document.getElementById("items").value.split("\n")
let tax=parseFloat(document.getElementById("tax").value||0)
let tender=document.getElementById("tender").value
let footer=document.getElementById("footer").value.split("\n")
let date=document.getElementById("date").value
let time=document.getElementById("time").value

let sub=0
let count=0

let txt=""

txt+=name.toUpperCase()+"\n"
txt+=loc.toUpperCase()+"\n"
txt+=`ST# ${st} OP# ${op} TE# ${te} TR# ${tr}\n\n`

items.forEach(r=>{
let p=r.split("|")
if(p.length<2)return
let n=p[0]
let pr=parseFloat(p[1])
if(!n||isNaN(pr))return
sub+=pr
count++
txt+=line(n,pr)+"\n"
})

let taxAmt=sub*(tax/100)
let total=sub+taxAmt

txt+="\n"
txt+=line("SUBTOTAL",sub)+"\n"
txt+=line("TAX 1  "+tax.toFixed(2)+" %",taxAmt)+"\n"
txt+=line("TOTAL",total)+"\n\n"
txt+=line(tender,total)+"\n"
txt+=line("CHANGE DUE",0)+"\n\n"
txt+="# ITEMS SOLD "+count+"\n\n"
txt+=date+" "+time+"\n\n"

footer.forEach(f=>{
if(f.trim()) txt+=f.toUpperCase()+"\n"
})

document.getElementById("out").textContent=txt
}
</script>

</body>
</html>
