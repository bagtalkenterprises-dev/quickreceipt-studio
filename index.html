<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickReceipt Studio</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f5f5f5;
}

.container {
  max-width: 400px;
  margin: auto;
}

input, textarea, select, button {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: black;
  color: white;
  font-weight: bold;
}

canvas {
  width: 100%;
  background: white;
  border: 1px solid #ccc;
  touch-action: none;
}
</style>
</head>

<body>

<div class="container">

<h2>Receipt Editor</h2>

<input type="file" id="upload">

<button onclick="addLayer()">Add Text</button>

<textarea id="text">NEW TEXT</textarea>

<input id="size" type="number" value="24">

<select id="weight">
  <option>normal</option>
  <option selected>bold</option>
</select>

<button onclick="applyChanges()">Apply Changes</button>
<button onclick="download()">Download PNG</button>

<canvas id="canvas"></canvas>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let layers = [];
let selected = -1;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

canvas.width = 350;
canvas.height = 600;

document.getElementById("upload").onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    img.onload = draw;
    img.src = reader.result;
  };

  reader.readAsDataURL(file);
};

function addLayer() {
  layers.push({
    text: "NEW TEXT",
    x: 50,
    y: 50,
    size: 24,
    weight: "bold"
  });
  selected = layers.length - 1;
  draw();
}

function applyChanges() {
  if (selected < 0) return;

  let l = layers[selected];

  l.text = document.getElementById("text").value;
  l.size = parseInt(document.getElementById("size").value);
  l.weight = document.getElementById("weight").value;

  draw();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (img.src) {
    ctx.drawImage(img, offsetX, offsetY, img.width*scale, img.height*scale);
  }

  layers.forEach((l,i)=>{
    ctx.font = l.weight + " " + l.size + "px monospace";
    ctx.fillStyle = "black";
    ctx.fillText(l.text, l.x, l.y);
  });
}

let dragging = false;
let dragLayer = false;
let startX, startY;

canvas.addEventListener("mousedown", e=>{
  startX = e.offsetX;
  startY = e.offsetY;

  dragLayer = false;

  layers.forEach((l,i)=>{
    if (
      startX > l.x-50 && startX < l.x+200 &&
      startY > l.y-20 && startY < l.y+20
    ){
      selected = i;
      dragLayer = true;
    }
  });

  dragging = true;
});

canvas.addEventListener("mousemove", e=>{
  if (!dragging) return;

  let dx = e.offsetX - startX;
  let dy = e.offsetY - startY;

  startX = e.offsetX;
  startY = e.offsetY;

  if (dragLayer && selected >= 0) {
    layers[selected].x += dx;
    layers[selected].y += dy;
  } else {
    offsetX += dx;
    offsetY += dy;
  }

  draw();
});

canvas.addEventListener("mouseup", ()=> dragging=false);

canvas.addEventListener("wheel", e=>{
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.min(Math.max(0.5, scale), 3);
  draw();
});

function download(){
  let link = document.createElement("a");
  link.download = "receipt.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
